# SonarQube configuration for the Quarkus gold-template microservice.
#
# The CI job invokes:
#   ./mvnw -B verify sonar:sonar \
#     -Dsonar.projectKey=<from-vars> -Dsonar.host.url=<from-vars> -Dsonar.token=<from-secret>
#
# Values in this file are static / per-project; secrets and host URL come from CI env.

sonar.projectKey=quarkus-ms-gold-template
sonar.projectName=Quarkus MS Gold Template
sonar.projectVersion=1.0.0-SNAPSHOT

# Sources and tests layout (Maven standard).
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=25
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Quarkus build produces a fat runtime layout under target/quarkus-app/lib.
# Including it lets the analyser resolve framework types that influence rule results.
sonar.java.libraries=target/quarkus-app/lib/main/*.jar,target/quarkus-app/lib/boot/*.jar

# Coverage: JaCoCo is wired in pom.xml; report emitted on `mvn verify`.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml

# Global exclusions: never analyse build output, generated sources, or third-party artefacts.
sonar.exclusions=\
  **/target/**,\
  **/generated-sources/**,\
  **/generated/**,\
  **/quarkus-app/**,\
  openapi/**,\
  deploy/**,\
  grafana/**,\
  load-tests/**,\
  docs/**,\
  scripts/**

# Coverage exclusions: Quarkus idioms where unit-coverage is misleading.
#   - *Resource.java:      JAX-RS endpoints — covered by integration tests, not unit tests.
#   - dto/**, request/**:  records/POJOs without logic — coverage adds noise, not signal.
#   - model/**:            JPA entities — mostly generated accessors.
#   - OpenApiDefinition.java + DefaultResponseDescriptionOASFilter.java:
#                          declarative OpenAPI wiring; no runtime branches worth covering.
#   - TestDataGenerator.java: dev-only seeder, guarded by profile.
sonar.coverage.exclusions=\
  **/*Resource.java,\
  **/dto/**,\
  **/request/**,\
  **/model/**,\
  **/openapi/OpenApiDefinition.java,\
  **/openapi/DefaultResponseDescriptionOASFilter.java,\
  **/config/TestDataGenerator.java

# Duplication analysis — exclude DTOs/records where duplication is intrinsic.
sonar.cpd.exclusions=\
  **/dto/**,\
  **/request/**,\
  **/model/**

# Encoding.
sonar.sourceEncoding=UTF-8

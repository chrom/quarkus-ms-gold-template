apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-quarkus-microservice
  title: New Quarkus Microservice
  description: Creates a new production-ready Quarkus microservice based on the Gold Template.
  tags:
    - java
    - quarkus
    - rest
spec:
  owner: group:default/team-platform
  type: service
  parameters:
    - title: Microservice Configuration
      required:
        - component_id
        - java_package
      properties:
        component_id:
          title: Name
          type: string
          description: Unique name of the component (e.g., identity-service).
          ui:field: EntityNamePicker
        java_package:
          title: Java Package
          type: string
          description: Base Java package (e.g., com.company.identity).
          default: "com.company.service"
    - title: Repository Setup
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-base
      name: Fetching Gold Template
      action: fetch:template
      input:
        url: ./
        values:
          name: ${{ values.component_id }}
          java_package: ${{ values.java_package }}
    - id: publish
      name: Publishing to Source Control
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: This is ${{ values.component_id }}
        repoUrl: ${{ values.repoUrl }}
    - id: register
      name: Registering in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Backstage
        url: ${{ steps['register'].output.entityRef }}

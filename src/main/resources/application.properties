# =============================================================================
# quarkus-ms-gold-template — application.properties
#
# Table of Contents:
#   1. HTTP
#   2. Datasource, Flyway, Hibernate (validate; no auto DDL)
#   3. Application Properties (app.*, greeting) and Profiles
#   4. OpenTelemetry → Jaeger (deploy/docker-compose-metrics.yml)
#   5. Application Logs: console, file, rotation, levels (including JSON in prod for Loki)
#   6. HTTP access log
#   7–9. Micrometer, OTEL sampling, SRE / health / pool
#  10. OIDC (optional profile: secured)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. HTTP
# -----------------------------------------------------------------------------
quarkus.http.port=8080
quarkus.http.http2=true

# -----------------------------------------------------------------------------
# 1b. OpenAPI — export at Maven build (quarkus-smallrye-openapi)
# YAML + JSON land in ./openapi/ — see Makefile: openapi-generate-*
# -----------------------------------------------------------------------------
%dev.quarkus.smallrye-openapi.store-schema-directory=openapi
%dev.quarkus.smallrye-openapi.store-schema-file-name=openapi-dev

%prod.quarkus.smallrye-openapi.store-schema-directory=openapi
%prod.quarkus.smallrye-openapi.store-schema-file-name=openapi

# Merges into exported OpenAPI (build); keep in sync with org.acme.openapi.OpenApiDefinition @Info
quarkus.smallrye-openapi.info-title=Quarkus MS Gold Template API
quarkus.smallrye-openapi.info-description=Reference REST API for the Gold Template: diagnostics, configuration endpoints, and the catalog bounded context (products and categories).
quarkus.smallrye-openapi.info-contact-name=Platform / template maintainers
quarkus.smallrye-openapi.info-contact-email=platform@example.com

# -----------------------------------------------------------------------------
# 2. Datasource and Hibernate
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql

# --- Hibernate: schema ---
# The schema is created only by Flyway (db/migration). Hibernate does not generate DDL — it only checks model consistency (validate).
%dev.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.schema-management.strategy=validate
%prod.quarkus.hibernate-orm.schema-management.strategy=validate

# Flyway: apply migrations before starting persistence (see docs/observability/database-migrations.md)
quarkus.flyway.migrate-at-start=true

# --- Dev Services PostgreSQL (quarkus:dev only) ---
# Do not pin devservices.port in repo: fixed ports cause Docker "Bind for 0.0.0.0:PORT failed:
# port is already allocated" when another quarkus:dev, Testcontainers, or a stale container holds it.
# For a stable DBeaver port locally: export QUARKUS_DATASOURCE_DEVSERVICES_PORT=55432
# before ./mvnw quarkus:dev (pick a free high port), or use an untracked local properties override.
%dev.quarkus.datasource.username=quarkus
%dev.quarkus.datasource.password=quarkus

# --- Test profile: PostgreSQL via Testcontainers (see ADR 0011) ---
# All @QuarkusTest tests and the standalone FlywayMigrationIT run against a real PostgreSQL
# container started by Quarkus Dev Services / Testcontainers. The image major version MUST
# match production (bitnami/postgresql 16.x) so migration behaviour under test is identical
# to what runs in stage/prod. No H2, no in-memory shortcut — ArchitectureConventionsTest
# enforces this at build time.
%test.quarkus.datasource.devservices.image-name=postgres:16-alpine
%test.quarkus.datasource.devservices.db-name=catalog_test
# `reuse=true` only activates when the developer opts in via ~/.testcontainers.properties
# (testcontainers.reuse.enable=true). CI ignores it; every PR gets a pristine container.
%test.quarkus.datasource.devservices.reuse=true

# -----------------------------------------------------------------------------
# 3. Application Properties and Profiles
# -----------------------------------------------------------------------------
greeting.message=Hello from Quarkus REST

app.name=Quarkus Demo App
app.features.experimental=false
app.features.enabled-list=auth,metrics

# --- Platform profile intent (see docs/runtime/profiles.md) ---
# dev  : developer experience, minimal infra required
# test : deterministic tests, no external dependencies
# stage: prod-like settings, but non-prod integration endpoints/secrets
# prod : strict defaults (security headers, OIDC on), assumes gateway present

%dev.app.name=Quarkus Demo (DEV MODE)
%dev.app.features.experimental=true

%stage.app.name=Quarkus Demo (STAGE)

%prod.app.name=Quarkus Demo Production

# -----------------------------------------------------------------------------
# 3b. Security headers (Phase B.4 — hardening)
# Implemented via a response filter toggled by template.security.headers.enabled
# -----------------------------------------------------------------------------
template.security.headers.enabled=false
%stage.template.security.headers.enabled=true
%prod.template.security.headers.enabled=true

# -----------------------------------------------------------------------------
# 3c. CORS template (Phase B.4 — hardening)
# Owner: API Gateway in stage/prod. Keep service-side CORS OFF by default.
# Enable explicitly only when you expose the service directly to browsers.
# -----------------------------------------------------------------------------
quarkus.http.cors.enabled=false
# Example (DO NOT enable globally without reviewing):
# quarkus.http.cors.enabled=true
# quarkus.http.cors.origins=https://app.example.com
# quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
# quarkus.http.cors.headers=Authorization,Content-Type,X-Request-Id
# quarkus.http.cors.access-control-max-age=24H

# -----------------------------------------------------------------------------
# 4. OpenTelemetry (traces → Jaeger)
# In Jaeger look for service name = quarkus.otel.service.name.
# Host: quarkus:dev on machine → 127.0.0.1:4317 (port from deploy/docker-compose-metrics.yml).
# Application in Docker → override endpoint (e.g., host.docker.internal:4317).
# -----------------------------------------------------------------------------
quarkus.otel.service.name=quarkus-ms-gold-template
quarkus.otel.exporter.otlp.endpoint=http://127.0.0.1:4317
quarkus.otel.exporter.otlp.protocol=grpc

# -----------------------------------------------------------------------------
# 5. Application Logs
# -----------------------------------------------------------------------------

# --- Console (dev: text + MDC; prod: JSON for centralized collection) ---
# MDC: requestId, traceId, spanId — correlation with Jaeger / Loki
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (requestId=%X{requestId}) (traceId=%X{traceId}) (spanId=%X{spanId}) %s%e%n

# Prod: JSON (quarkus-logging-json). Collection in Loki usually through Docker stdout → Grafana Alloy.
# pretty-print is convenient for reading; for strict single-line JSON (some agents) it can be disabled.
%prod.quarkus.log.console.json.enabled=true
%prod.quarkus.log.console.json.pretty-print=false
%prod.quarkus.log.category."org.jboss.resteasy.reactive.common.logging".level=WARN
%prod.quarkus.log.category."org.hibernate".level=WARN

# --- File + daily rotation (dev only) ---
# In dev/test the file appender gives a convenient local log-tail and is compatible
# with a writable working directory. In %prod the container runs with
# `readOnlyRootFilesystem: true` (see Helm values: containerSecurityContext) and logs
# are collected from stdout by Grafana Alloy → Loki, so the file appender is disabled.
# See ADR 0006 (logging) and ADR 0010 (runtime hardening).
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/quarkus.log
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}] (%t) (requestId=%X{requestId}) (traceId=%X{traceId}) (spanId=%X{spanId}) %s%e%n
quarkus.log.file.rotation.file-suffix=-yyyy-MM-dd.gz
quarkus.log.file.rotation.max-backup-index=30
quarkus.log.file.rotation.max-file-size=100M
%prod.quarkus.log.file.enabled=false

# -----------------------------------------------------------------------------
# 6. HTTP access log (separate stream: who, where, status)
# -----------------------------------------------------------------------------
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b "%{i,User-Agent}" requestId.in=%{i,X-Request-Id} requestId.out=%{o,X-Request-Id} traceId=%{X,traceId} spanId=%{X,spanId}
quarkus.http.access-log.log-to-file=true
quarkus.http.access-log.base-file-name=access
quarkus.http.access-log.log-directory=logs
# In %prod: stdout only (see note above the file appender).
%prod.quarkus.http.access-log.log-to-file=false

# -----------------------------------------------------------------------------
# 7. Micrometer — максимум метрик (див. docs/observability/monitoring-optimization-plan.md)
# -----------------------------------------------------------------------------
quarkus.micrometer.binder.vertx.enabled=true
quarkus.micrometer.binder.netty.enabled=true
quarkus.micrometer.binder.virtual-threads.enabled=true
# Кардинальність: не-app URI зазвичай приховані; додайте regex через ignore-patterns за потреби
# quarkus.micrometer.binder.http-server.ignore-patterns=

# -----------------------------------------------------------------------------
# 8. OpenTelemetry — семплінг (prod знижує навантаження на Jaeger)
# -----------------------------------------------------------------------------
%dev.quarkus.otel.traces.sampler=always_on
%test.quarkus.otel.traces.sampler=always_on
%prod.quarkus.otel.traces.sampler=parentbased_traceidratio
%prod.quarkus.otel.traces.sampler.arg=0.25

# -----------------------------------------------------------------------------
# 9. SRE & Production Readiness (Kubernetes, Reliability)
# -----------------------------------------------------------------------------
# --- Graceful Shutdown: Дочекатись обробки активних запитів перед вмиранням (до 10 секунд) ---
quarkus.shutdown.timeout=10S

# --- Health Checks: Окремі Endpoint'и для K8s Liveness/Readiness ---
quarkus.smallrye-health.extensions.enabled=true
quarkus.smallrye-health.check.metrics.enabled=true

# --- Database Connection Pool (Agroal): Жорсткі ліміти для запобігання падінь під навантаженням ---
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# -----------------------------------------------------------------------------
# 10. OIDC (optional profile: secured) — ADR 0008 Phase B
# Default: OIDC off — no Keycloak required for ./mvnw quarkus:dev or tests.
# Activate: QUARKUS_PROFILE=dev,secured or -Dquarkus.profile=dev,secured
# See: docs/security/oidc-secured-profile.md
# -----------------------------------------------------------------------------
quarkus.oidc.enabled=false

# Stage/prod: OIDC enabled by default (assumes gateway + issuer available).
# Provide these via environment variables in Kubernetes/Helm.
%stage.quarkus.oidc.enabled=true
%stage.quarkus.oidc.application-type=service
%stage.quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:}
%stage.quarkus.oidc.client-id=${QUARKUS_OIDC_CLIENT_ID:}
%stage.quarkus.oidc.credentials.secret=${QUARKUS_OIDC_CLIENT_SECRET:}
%stage.quarkus.oidc.roles.role-claim-path=realm_access/roles
%stage.quarkus.http.auth.permission.public.paths=/q/health,/q/health/*,/q/metrics,/q/swagger-ui,/q/swagger-ui/*,/q/openapi,/q/openapi/*
%stage.quarkus.http.auth.permission.public.policy=permit

%prod.quarkus.oidc.enabled=true
%prod.quarkus.oidc.application-type=service
%prod.quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:}
%prod.quarkus.oidc.client-id=${QUARKUS_OIDC_CLIENT_ID:}
%prod.quarkus.oidc.credentials.secret=${QUARKUS_OIDC_CLIENT_SECRET:}
%prod.quarkus.oidc.roles.role-claim-path=realm_access/roles
%prod.quarkus.http.auth.permission.public.paths=/q/health,/q/health/*,/q/metrics,/q/swagger-ui,/q/swagger-ui/*,/q/openapi,/q/openapi/*
%prod.quarkus.http.auth.permission.public.policy=permit

%secured.quarkus.oidc.enabled=true
%secured.quarkus.oidc.application-type=service
%secured.quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/gold-dev}
%secured.quarkus.oidc.client-id=${QUARKUS_OIDC_CLIENT_ID:quarkus-app}
%secured.quarkus.oidc.credentials.secret=${QUARKUS_OIDC_CLIENT_SECRET:}
# Keycloak: map realm roles → SecurityIdentity roles (for @RolesAllowed / authorization)
%secured.quarkus.oidc.roles.role-claim-path=realm_access/roles

# With OIDC on, keep ops & docs endpoints public (catalog / hello stay open — no global deny)
%secured.quarkus.http.auth.permission.public.paths=/q/health,/q/health/*,/q/metrics,/q/swagger-ui,/q/swagger-ui/*,/q/openapi,/q/openapi/*
%secured.quarkus.http.auth.permission.public.policy=permit

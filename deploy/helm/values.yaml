# ==============================================
# Gold Template Helm Chart — Default Values
# ==============================================
# Override per environment:
#   helm install ... -f values-stage.yaml
#   helm install ... --set image.tag=abc123

# ── Image ──────────────────────────────────────
image:
  repository: ghcr.io/your-org/quarkus-ms-gold-template   # override per service
  tag: "latest"                                            # SET in CI: --set image.tag=${{ github.sha }}
  pullPolicy: IfNotPresent

# ── Replicas / Scaling ─────────────────────────
replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# ── Service ────────────────────────────────────
service:
  type: ClusterIP
  port: 8080

# ── Routing / L7 exposure ──────────────────────
# North-south routing (Host/path → Service) is handled by the platform in `infra-bootstrap`
# via Gateway API (Envoy Gateway + HTTPRoute). This chart intentionally does NOT ship an
# `Ingress` template: maintaining two routing surfaces (Ingress here + HTTPRoute in infra)
# leads to silent drift and conflicting 2×-backends on the same host.
#
# To expose this service, add an `HTTPRoute` in `infra-bootstrap/k8s/gateway/routes/`
# pointing at the `Service` rendered by this chart. See docs/adr/0010-*.md §"Exposure".

# ── Pod hardening (Pod Security Standards — restricted) ──────────────
# All three settings below are required for the `restricted` PSS level.
# Mutate these in values-*.yaml overrides rather than inline in templates.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001          # matches `USER 1001` in Dockerfile.native-micro / .jvm
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true    # requires an emptyDir on /tmp — provided by deployment.yaml
  runAsNonRoot: true
  capabilities:
    drop: ["ALL"]

# ── Disruption budget (SRE — minimum availability during voluntary disruptions) ──
podDisruptionBudget:
  enabled: true
  # Use `minAvailable` or `maxUnavailable`, not both. `minAvailable: 1` means the
  # evictor (cluster autoscaler, node drain, …) will keep ≥ 1 pod running.
  minAvailable: 1
  # maxUnavailable: ""

# ── NetworkPolicy (env-split — see ADR 0010) ───────────────
# IMPORTANT: a NetworkPolicy only takes effect when the cluster CNI enforces it.
# Flannel (k3d default) does NOT enforce — objects are accepted but ignored. Cilium /
# Calico / native NetworkPolicy-capable CNIs DO enforce. Therefore this chart ships
# with `enabled: false` in values.yaml (local/dev on k3d/flannel) and `enabled: true`
# in values-stage.yaml / values-prod.yaml (clusters with enforcement).
networkPolicy:
  enabled: false
  # Namespaces allowed to reach the pod's HTTP port. Uses the well-known
  # `kubernetes.io/metadata.name` label injected into every namespace by kube-apiserver.
  ingressFromNamespaces:
    - gateway-system   # Envoy Gateway (north-south traffic)
    - monitoring       # Prometheus scrape of /q/metrics
  # Namespaces the pod is allowed to egress to. DNS (kube-system) and same-namespace
  # (PostgreSQL subchart, sidecars) are added automatically in the template.
  egressToNamespaces:
    - monitoring       # OTLP → tempo / alloy
    - keycloak         # OIDC discovery + JWKs
  # Escape hatches — raw NetworkPolicyIngress/EgressRule entries appended to the generated
  # policy. Useful for services that legitimately talk to the public internet or to
  # peers in non-default namespaces without polluting the generic defaults above.
  extraIngress: []
  extraEgress: []

# ── Resources (SRE Rule: always set limits) ────
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "1000m"

# ── Service Account ────────────────────────────
serviceAccount:
  create: true
  name: ""           # auto-generated if empty

# ── Application Config ─────────────────────────
app:
  profile: prod                  # QUARKUS_PROFILE
  jvmMaxRamPercentage: "75.0"    # -XX:MaxRAMPercentage — headroom for off-heap

# ── Health Probes (Quarkus SmallRye Health) ────
probes:
  liveness:
    path: /q/health/live
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /q/health/ready
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# ── Observability (ADR 0002) ───────────────────
monitoring:
  # ServiceMonitor — Prometheus Operator auto-discovery
  serviceMonitor:
    enabled: true
    interval: "15s"
    scrapeTimeout: "12s"
    path: /q/metrics
    # Must match the label selector in infra-bootstrap helm/observability/values.yaml
    labels:
      release: kube-prometheus-stack

  # Grafana Dashboard — ConfigMap sidecar auto-discovery
  dashboard:
    enabled: true
    # Must match grafana.sidecar.dashboards.label in infra-bootstrap
    label: grafana_dashboard
    labelValue: "1"
    folder: "Services"

# ── Keycloak Client Registration (ADR 0002 §3) ─
# Phase 1: disabled — client created manually in realm JSON
# Phase 2: enable + provide adminSecretRef
keycloak:
  registration:
    enabled: false
    url: "http://keycloak.keycloak.svc.cluster.local:8180"
    realm: "gold-dev"
    adminSecretRef:
      name: keycloak-admin-credentials   # SealedSecret in infra-bootstrap
      userKey: username
      passwordKey: password

# ── OIDC (optional — enable for secured profile) ─
oidc:
  enabled: true
  # In-cluster Keycloak (infra-bootstrap) issuer URL:
  authServerUrl: "http://keycloak.keycloak.svc.cluster.local:8180/realms/gold-dev"   # QUARKUS_OIDC_AUTH_SERVER_URL
  # Resource server client id (realm JSON): override per service if renamed.
  clientId: "quarkus-ms-gold-template-api"        # QUARKUS_OIDC_CLIENT_ID
  # clientSecret: ""                             # QUARKUS_OIDC_CLIENT_SECRET (optional)

# ── OTLP Tracing ──────────────────────────────
tracing:
  enabled: true
  endpoint: "http://tempo-distributor.monitoring.svc.cluster.local:4317"   # Tempo in cluster (tempo-distributed)
  # Quarkus OTEL: make traces deterministic in local k3d
  sampler: "always_on"

# ── Database (PostgreSQL via bitnami/postgresql subchart) ───
# For local k3d: enabled=true spins up a dedicated postgres pod.
# For stage/prod: set enabled=false and override externalDatabase.*
database:
  url: ""  # auto-built from postgresql subchart if empty; override for external DB
  username: quarkus
  password: quarkus
  name: quarkus
# For stage/prod (recommended): inject JDBC URL via a SealedSecret/ExternalSecret:
# database.existingSecret: my-db-secret
# database.existingSecretKey: jdbc-url
# Keyed secret ref (optional — override with SealedSecret for stage/prod):
# database.existingSecret: my-db-secret
# database.existingSecretKey: jdbc-url

postgresql:
  enabled: true
  image:
    tag: latest   # always pull latest; Bitnami removes old pinned tags from Docker Hub
  auth:
    username: quarkus
    password: quarkus
    database: quarkus
  primary:
    persistence:
      size: 1Gi

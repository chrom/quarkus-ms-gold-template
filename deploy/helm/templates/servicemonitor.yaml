# ═══════════════════════════════════════════════════════════════
# ServiceMonitor — Automatic Prometheus registration (ADR 0002 §1)
# ═══════════════════════════════════════════════════════════════
# How it works:
#   1. This CRD is created when 'helm install' runs
#   2. Prometheus Operator (in kube-prometheus-stack) watches for ServiceMonitors
#      across all namespaces (configured in infra-bootstrap/helm/observability/values.yaml)
#   3. Prometheus automatically starts scraping /q/metrics on this service
#   4. 'helm uninstall' removes the ServiceMonitor → Prometheus stops scraping
#
# Zero changes needed in infra-bootstrap when a new service is deployed.
# ═══════════════════════════════════════════════════════════════
{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    # This label is the selector used by Prometheus Operator in infra-bootstrap.
    # Must match: prometheusSpec.serviceMonitorSelector in helm/observability/values.yaml
    {{- with .Values.monitoring.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.monitoring.serviceMonitor.path }}
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}

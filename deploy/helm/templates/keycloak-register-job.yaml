# ═══════════════════════════════════════════════════════════════
# Keycloak Client Registration Job (ADR 0002 §3)
# ═══════════════════════════════════════════════════════════════
# STATUS: DISABLED by default (keycloak.registration.enabled=false)
# Phase 1: clients created manually → make realm-export in infra-bootstrap
# Phase 2: enable this Job for automatic registration on helm install
# ═══════════════════════════════════════════════════════════════
{{- if .Values.keycloak.registration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chart.fullname" . }}-kc-register
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    # Run after install AND upgrade — idempotent (skips if client exists)
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "0"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "chart.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-registration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kc-register
          # Reuse Keycloak image — has kcadm.sh built in
          image: quay.io/keycloak/keycloak:26.1.4
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              CLIENT_ID="{{ include "chart.name" . }}-api"
              KC_URL="{{ .Values.keycloak.registration.url }}"
              KC_REALM="{{ .Values.keycloak.registration.realm }}"

              echo "▶ Configuring kcadm credentials..."
              /opt/keycloak/bin/kcadm.sh config credentials \
                --server "${KC_URL}" \
                --realm master \
                --user "${KC_ADMIN_USER}" \
                --password "${KC_ADMIN_PASSWORD}"

              echo "▶ Checking if client '${CLIENT_ID}' already exists in realm '${KC_REALM}'..."
              EXISTS=$(/opt/keycloak/bin/kcadm.sh get clients \
                -r "${KC_REALM}" \
                --fields clientId \
                | grep -c "\"${CLIENT_ID}\"" || true)

              if [ "${EXISTS}" -eq "0" ]; then
                echo "▶ Creating client '${CLIENT_ID}'..."
                /opt/keycloak/bin/kcadm.sh create clients -r "${KC_REALM}" \
                  -s "clientId=${CLIENT_ID}" \
                  -s enabled=true \
                  -s bearerOnly=true \
                  -s "description=Resource server for {{ include "chart.name" . }}. Auto-registered by Helm."
                echo "✅ Client '${CLIENT_ID}' created."
              else
                echo "ℹ️  Client '${CLIENT_ID}' already exists — skipping."
              fi
          env:
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.registration.adminSecretRef.name }}
                  key: {{ .Values.keycloak.registration.adminSecretRef.userKey }}
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.registration.adminSecretRef.name }}
                  key: {{ .Values.keycloak.registration.adminSecretRef.passwordKey }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
{{- end }}

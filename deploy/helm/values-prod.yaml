# Prod overrides for the Gold Template chart
#
# This file is intentionally strict: it avoids relying on placeholder defaults for production.
# Provide these values via your platform pipeline (values-prod.yaml + SealedSecrets/ExternalSecrets).

app:
  profile: prod

oidc:
  enabled: true
  authServerUrl: ""   # REQUIRED: QUARKUS_OIDC_AUTH_SERVER_URL
  clientId: ""        # REQUIRED: QUARKUS_OIDC_CLIENT_ID

# Routing on prod is owned by the platform Gateway API (infra-bootstrap).
# Add/update the relevant HTTPRoute there rather than enabling Ingress here.

# Prod must run on a NetworkPolicy-enforcing CNI (Cilium / Calico / …).
# A CI gate in .github/workflows/ci.yaml asserts that `helm template -f values-prod.yaml`
# renders a NetworkPolicy — see ADR 0010.
networkPolicy:
  enabled: true

